name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Weekly Mondays at 07:00 UTC — staggered from CodeQL so they don't compete for runners.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Upload SARIF to the Security tab.
      security-events: write
      # Sign the results for the public Scorecard API.
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results: true serves the badge from api.scorecard.dev.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
