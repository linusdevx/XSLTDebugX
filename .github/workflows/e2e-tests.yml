name: E2E Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main, dev]

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== dist/index.html script tags ==="
          grep -E "script src|link rel" dist/index.html || echo "WARNING: no script/link tags found"
          echo "=== Confirming built app (no js/ tags in index.html) ==="
          grep 'src="js/' dist/index.html && echo "❌ FAIL: raw js/ tags found — not built" || echo "✅ PASS: serving built bundle"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create artifact directories
        run: mkdir -p playwright-report test-results

      - name: Run E2E tests
        run: npx playwright test --workers=4
        env:
          CI: true
          BASE_URL: http://localhost:8000
          TEST_SERVER: dist

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Report test results
        if: failure()
        run: |
          echo "❌ E2E tests failed. Download the report from artifacts to debug."
          exit 1
