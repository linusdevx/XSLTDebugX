name: E2E Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main, dev]

# Least-privilege default; jobs opt in to more if needed.
permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== dist/index.html script tags ==="
          grep -E "script src|link rel" dist/index.html || echo "WARNING: no script/link tags found"
          echo "=== Confirming built app (no js/ tags in index.html) ==="
          grep 'src="js/' dist/index.html && echo "❌ FAIL: raw js/ tags found — not built" || echo "✅ PASS: serving built bundle"

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Create artifact directories
        run: mkdir -p playwright-report test-results

      - name: Run E2E tests
        run: npx playwright test --workers=4
        env:
          CI: true
          BASE_URL: http://localhost:8000
          TEST_SERVER: dist

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Report test results
        if: failure()
        run: |
          echo "❌ E2E tests failed. Download the report from artifacts to debug."
          exit 1
