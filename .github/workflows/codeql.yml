name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly Mondays at 06:00 UTC — independent of push activity so the
    # badge stays current even when the repo is quiet.
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          # Saxon-JS is a vendored third-party engine — out of scope for findings on our code.
          # tests/ is Playwright harness code, not shipped to users.
          config: |
            paths-ignore:
              - lib/SaxonJS2.js
              - tests/**
              - dist/**

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
